<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - MemeManoranjan</title>
    <meta name="description" content="Join MemeManoranjan.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Inter:wght@400;600;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .auth-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: calc(100vh - 100px);
            padding: 20px;
        }

        #success-message {
            color: #2ecc71;
            background: rgba(46, 204, 113, 0.1);
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 15px;
            display: none;
            text-align: center;
            font-weight: 600;
        }

        .toggle-btn {
            color: #aaa;
            cursor: pointer;
            margin-left: 10px;
            transition: color 0.2s;
        }

        .toggle-btn:hover {
            color: white;
        }
    </style>
</head>

<body class="graffiti-theme">
    <div class="background-decor">
        <div class="bg-text bg-text-1">CREATIVE</div>
        <div class="bg-text bg-text-2">SIGNUP</div>
        <div class="sticker sticker-1"><i class="fas fa-magic"></i></div>
        <div class="sticker sticker-2"><i class="fas fa-heart"></i></div>
        <div class="sticker sticker-3"><i class="fas fa-fire"></i></div>
    </div>

    <header>
        <nav class="container">
            <div class="logo">
                <a href="index.html" style="text-decoration:none; color:inherit; display:flex; align-items:center; gap:10px;">
                    <i class="fas fa-spray-can"></i>
                    <span>Meme<span>Manoranjan</span></span>
                </a>
            </div>
            <div class="nav-actions">
                <a href="index.html" class="nav-tab" style="text-decoration:none;">Home</a>
            </div>
        </nav>
    </header>

    <main class="container auth-container">
        <form class="form" id="signup-form">
            <h2 style="margin-bottom: 20px; text-align: center; font-family: 'Bangers', cursive; font-size: 2.5rem; letter-spacing: 1px;">Sign Up</h2>
            
            <div id="error-message" style="color: #ff4d4d; background: rgba(255, 77, 77, 0.1); padding: 10px; border-radius: 5px; margin-bottom: 15px; display: none; text-align: center; font-weight: 600;"></div>
            <div id="success-message"></div>

            <div class="flex-column">
                <label>User Name</label>
            </div>
            <div class="inputForm">
                <i class="fas fa-user" style="color:#aaa;"></i>
                <input type="text" id="username" class="input" placeholder="Enter your Name" required>
            </div>

            <div class="flex-column">
                <label>Email</label>
            </div>
            <div class="inputForm">
                <i class="fas fa-envelope" style="color:#aaa;"></i>
                <input type="email" id="email" class="input" placeholder="Enter your Email" required>
            </div>
            
            <div class="flex-column">
                <label>Password</label>
            </div>
            <div class="inputForm">
                <i class="fas fa-lock" style="color:#aaa;"></i>
                <input type="password" class="input" id="password" placeholder="Enter Password" required>
                <i class="fas fa-eye eye-icon toggle-btn" data-target="password" title="Show Password"></i>
            </div>

            <div class="flex-column">
                <label>Confirm Password</label>
            </div>
            <div class="inputForm">
                <i class="fas fa-lock" style="color:#aaa;"></i>
                <input type="password" class="input" id="confirm-password" placeholder="Confirm Password" required>
                <i class="fas fa-eye eye-icon toggle-btn" data-target="confirm-password" title="Show Password"></i>
            </div>
            
            <button type="submit" class="button-submit">Sign Up</button>
            
            <p class="p">Already have an account? <a href="login.html" class="span">Log In</a></p>
            
            <p class="p" style="margin: 10px 0;">Or With</p>
            <button type="button" class="btn" id="google-signup-btn">
                <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_%22G%22_logo.svg" alt="Google" width="20" height="20">
                Google
            </button>
        </form>
    </main>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script>
        const API_URL = 'http://127.0.0.1:5000/api/auth';
        const GOOGLE_CLIENT_ID = 'YOUR_GOOGLE_CLIENT_ID_HERE.apps.googleusercontent.com'; // Replace with actual Client ID
        const signupForm = document.getElementById('signup-form');
        const errorDiv = document.getElementById('error-message');
        const successDiv = document.getElementById('success-message');

        // Password toggles
        document.querySelectorAll('.toggle-btn').forEach(btn => {
            btn.addEventListener('click', function () {
                const targetId = this.getAttribute('data-target');
                const passwordInput = document.getElementById(targetId);
                if (!passwordInput) return;

                const isPassword = passwordInput.getAttribute('type') === 'password';
                passwordInput.setAttribute('type', isPassword ? 'text' : 'password');
                this.className = isPassword ? 'fas fa-eye-slash eye-icon toggle-btn' : 'fas fa-eye eye-icon toggle-btn';
                this.style.color = isPassword ? 'white' : '#aaa';
            });
        });

        // Initialize Google Sign-In
        window.onload = function () {
            if (typeof google !== 'undefined') {
                google.accounts.id.initialize({
                    client_id: GOOGLE_CLIENT_ID,
                    callback: handleGoogleResponse
                });
                
                const googleBtn = document.getElementById('google-signup-btn');
                if (googleBtn) {
                    googleBtn.onclick = () => {
                        google.accounts.id.prompt(); 
                    };
                }
            }
        };

        async function handleGoogleResponse(response) {
            errorDiv.style.display = 'none';
            successDiv.style.display = 'none';
            try {
                const res = await fetch(`${API_URL}/google`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token: response.credential })
                });

                const data = await res.json();

                if (res.ok) {
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('user', JSON.stringify(data.user));
                    successDiv.textContent = 'Google login successful! Redirecting...';
                    successDiv.style.display = 'block';
                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 1000);
                } else {
                    errorDiv.textContent = data.error || 'Google login failed';
                    errorDiv.style.display = 'block';
                }
            } catch (err) {
                console.error('❌ Google Signup Connection Error:', err);
                errorDiv.textContent = 'Backend Connection Error. Make sure the Flask server is running on port 5000.';
                errorDiv.style.display = 'block';
            }
        }

        signupForm.addEventListener('submit', async (event) => {
            event.preventDefault();
            errorDiv.style.display = 'none';
            successDiv.style.display = 'none';

            const username = document.getElementById('username').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirm-password').value;

            if (password !== confirmPassword) {
                errorDiv.textContent = "Passwords do not match!";
                errorDiv.style.display = 'block';
                return;
            }

            try {
                const response = await fetch(`${API_URL}/signup`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ username, email, password })
                });

                const data = await response.json();

                if (response.ok) {
                    successDiv.textContent = data.message || 'Registration successful! Redirecting to login...';
                    successDiv.style.display = 'block';
                    setTimeout(() => {
                        window.location.href = 'login.html';
                    }, 2000);
                } else {
                    errorDiv.textContent = data.error || 'Registration failed';
                    errorDiv.style.display = 'block';
                }
            } catch (error) {
                console.error('❌ Signup Connection Error:', error);
                errorDiv.textContent = 'Backend Connection Error. Make sure the Flask server is running on port 5000.';
                errorDiv.style.display = 'block';
            }
        });
    </script>
</body>

</html>
