<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MemeManoranjan | Modern Meme Generator</title>
    <meta name="description"
        content="Generate and discover the funniest memes with MemeManoranjan. High-quality memes at your fingertips.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Inter:wght@400;600;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body class="graffiti-theme">
    <div class="background-decor">
        <div class="bg-text bg-text-1">FAMOUS</div>
        <div class="bg-text bg-text-2">GRAFFITI</div>
        <div class="sticker sticker-1"><i class="fas fa-star"></i></div>
        <div class="sticker sticker-2"><i class="fas fa-smile"></i></div>
        <div class="sticker sticker-3"><i class="fas fa-bolt"></i></div>
    </div>

    <header>
        <nav class="container">
            <div class="logo">
                <i class="fas fa-spray-can"></i>
                <span>Meme<span>Manoranjan</span></span>
            </div>
            <div class="nav-actions">
                <button id="nav-home" class="nav-tab home-tab active">Home</button>
                <button id="nav-favorites" class="nav-tab fav-tab">
                    <i class="fas fa-heart"></i> Favorites
                </button>

                <a href="login.html" id="login-nav-btn" class="nav-tab sign-tab" style="text-decoration: none;"><i class="fas fa-user-circle"></i> Log In</a>

                <div class="profile-container" id="profile-container">
                    <div class="profile-avatar" id="profile-avatar">M</div>
                    <div class="profile-dropdown" id="profile-dropdown">
                        <div class="dropdown-header">
                            <span class="dropdown-user-name" id="user-display-name">User Name</span>
                            <span class="dropdown-user-email" id="user-display-email">user@example.com</span>
                        </div>
                        <a href="#" class="dropdown-item"><i class="fas fa-user"></i> My Profile</a>
                        <a href="#" class="dropdown-item"><i class="fas fa-cog"></i> Settings</a>
                        <button class="dropdown-item logout" id="logout-btn"><i class="fas fa-sign-out-alt"></i> Logout</button>
                    </div>
                </div>
            </div>
        </nav>
    </header>

    <main class="container">
        <section class="hero">
            <div class="hero-content">
                <p class="hero-sub">PERSONALITY • TAKE ONE'S EASE • OPINION</p>
                <h1>LAUGH OUT LOUD WITH <span class="outline-text">MEME MANORANJAN</span></h1>
            </div>

            <div class="search-container retro">
                <div class="input-group">
                    <i class="fas fa-search"></i>
                    <input type="text" id="meme-search" placeholder="SEARCH FOR MEMES..." autocomplete="off">
                </div>
                <div class="button-group">
                    <button id="search-btn" class="primary-btn">SEARCH</button>
                    <button id="random-btn" class="secondary-btn">RANDOM</button>
                </div>
            </div>

            <div class="advanced-features">
                <div class="upload-container">
                    <label for="image-upload" class="upload-btn">
                        <i class="fas fa-upload"></i> UPLOAD IMAGE
                    </label>
                    <input type="file" id="image-upload" accept="image/*" hidden>
                </div>
            </div>

            <div class="template-gallery-container">
                <h3 class="gallery-title">🔥 Popular Templates</h3>
                <div class="template-gallery" id="template-gallery">
                    <!-- Templates injected via JS -->
                </div>
            </div>
        </section>

        <section class="meme-section">
            <div id="loading" class="hidden">
                <div class="loader"></div>
                <p>Fetching the fun...</p>
            </div>

            <div id="error-container" class="hidden glass-alert">
                <i class="fas fa-exclamation-circle"></i>
                <p id="error-message"></p>
            </div>

            <div id="meme-grid" class="meme-grid">
                <!-- Meme cards will be injected here -->
            </div>
            
            <div id="scroll-sentinel" class="scroll-sentinel hidden">
                <div class="loader small-loader" style="margin: 0 auto;"></div>
            </div>
        </section>
    </main>

    <footer class="container">
        <div class="footer-content">
            <p>&copy; 2026 MemeManoranjan. Created with <i class="fas fa-heart"></i> for the internet.</p>
            <div class="social-links">
                <a href="#" aria-label="Github"><i class="fab fa-github"></i></a>
                <a href="#" aria-label="Instagram"><i class="fab fa-instagram"></i></a>
            </div>
        </div>
    </footer>

    <script src="script.js"></script>
</body>

</html>
